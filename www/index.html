<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP2040 Web Serial Bridge - Pro Dashboard</title>
    <meta name="description" content="Advanced Web-based Serial Console for RP2040. Features custom baud rates, RX/TX monitoring, and premium terminal interface.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="glass-container">
        <header>
            <div class="logo-section">
                <div class="icon-pulsar"></div>
                <h1>RP2040 <span class="gradient-text">Bridge Pro</span></h1>
            </div>
            <div class="status-bar">
                <div id="connection-status" class="status-indicator disconnected">Disconnected</div>
                <button id="connect-btn" class="btn-primary">Connect Device</button>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Sidebar: Controls -->
            <aside class="controls-panel card">
                <section>
                    <h3>UART Configuration</h3>
                    <div class="input-group">
                        <label for="baud-rate">Baud Rate</label>
                        <select id="baud-rate" class="glass-input">
                            <option value="9600">9600</option>
                            <option value="19200">19200</option>
                            <option value="38400">38400</option>
                            <option value="57600">57600</option>
                            <option value="115200" selected>115200</option>
                            <option value="230400">230400</option>
                            <option value="460800">460800</option>
                            <option value="921600">921600</option>
                            <option value="custom">Custom...</option>
                        </select>
                    </div>
                    <div id="custom-baud-container" class="input-group hidden">
                        <label for="custom-baud">Custom Baud Rate</label>
                        <input type="number" id="custom-baud" class="glass-input" placeholder="e.g. 1000000">
                    </div>
                </section>

                <section class="diagnostics">
                    <h3>Live Diagnostics</h3>
                    <div class="diagnostic-grid">
                        <div class="stat-box">
                            <span class="label">RX Activity</span>
                            <div id="rx-activity" class="activity-led"></div>
                        </div>
                        <div class="stat-box">
                            <span class="label">TX Activity</span>
                            <div id="tx-activity" class="activity-led"></div>
                        </div>
                    </div>
                    <div id="wiring-alert" class="alert-box hidden">
                        <span class="alert-icon">⚠️</span>
                        <span class="alert-msg">Possible RX/TX swap detected!</span>
                    </div>
                </section>

                <section class="actions">
                    <button id="clear-btn" class="btn-secondary">Clear Terminal</button>
                    <button id="save-log-btn" class="btn-secondary">Save Log</button>
                </section>
            </aside>

            <!-- Main Terminal Area -->
            <section class="terminal-area card">
                <div id="terminal-header">
                    <span class="tab active">Serial Output</span>
                    <div class="terminal-actions">
                        <label class="checkbox-container">
                            <input type="checkbox" id="autoscroll" checked>
                            <span class="checkmark"></span> Auto-scroll
                        </label>
                        <label class="checkbox-container">
                            <input type="checkbox" id="timestamp">
                            <span class="checkmark"></span> Timestamps
                        </label>
                    </div>
                </div>
                <div id="terminal-output" class="terminal-content">
                    <div class="system-msg">Ready to connect. Select a baud rate and click 'Connect Device'.</div>
                </div>
                <div class="input-area">
                    <input type="text" id="terminal-input" placeholder="Type command and press Enter..." autocomplete="off">
                    <button id="send-btn" class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <div class="device-info">
                <span>RP2040 ID: <span id="device-id">---</span></span>
                <span>Uptime: <span id="uptime">00:00:00</span></span>
            </div>
            <div class="credits">Built for High Reliability Engineering</div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
